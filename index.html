
<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groep 28 Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
}

.card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(5px);
    border-radius: 15px;
    overflow: hidden; /* belangrijk */
    padding: 0;       /* geen witte rand */
    margin-bottom: 20px;
}

iframe {
    display: block;
    width: 100%;
    height: 70vh;
    border: 0;
}

.stats {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.stat {
    flex: 1;
    min-width: 150px;
    background: rgba(255,255,255,0.15);
    padding: 15px;
    border-radius: 10px;
    text-align: center;
}
</style>
</head>

<body>

<div class="container">

    <h1>📊 Leeftijd 9 - Groep 28</h1>


    <div class="card">
        <iframe src="https://docs.google.com/spreadsheets/d/e/2PACX-1vT1w-UC_f8lTDlNN8DF3ySS9MYP7YuPvjCjWzOKcJa1oUOOxUQkNezAlbGg8_kCuBrYrWXeYuv8YdOs/pubchart?oid=1550913182&amp;format=interactive"></iframe>
    </div>

    <div class="stats">
        <div class="stat">
            <h2>20</h2>
            <p>Volgers</p>
        </div>

        <div class="stat">
            <h2>#1</h2>
            <p>Positie</p>
        </div>
    </div>

</div>

</body>
</html>
